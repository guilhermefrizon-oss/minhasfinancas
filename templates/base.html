<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Minhas Finanças{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }
    nav {
      background: #1a73e8;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 56px;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    nav .brand { font-size: 1.2rem; margin-right: auto; }
    nav a:hover { opacity: 0.85; }
    .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
    .alert {
      padding: .75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: .9rem;
    }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}" class="brand">💰 Minhas Finanças</a>
    <a href="{{ url_for('index') }}">Dashboard</a>
    <a href="{{ url_for('adicionar') }}">+ Adicionar</a>
  </nav>
  <div class="container">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
